<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Surprise for My Goddess</title>
<style>
  body {
    background-color: #ffe0f0; /* Pink pastel yang sangat lembut */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Times New Roman', Times, serif; /* Kesan klasik dan romantis */
    margin: 0;
    overflow: hidden; /* Mencegah scrollbar saat confetti jatuh */
    position: relative;
  }

  /* --- EFEK HATI JATUH DI BELAKANG (Z-INDEX 0) --- */
  #heart-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0; /* Di belakang amplop */
    pointer-events: none;
  }
  .bg-heart {
    position: absolute;
    color: #ff99cc;
    font-size: 20px;
    opacity: 0;
    animation: fallingHeart 4s linear forwards;
  }
  @keyframes fallingHeart {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* --- KOTAK/AMPLOP UTAMA (Z-INDEX 10) --- */
  .box-wrapper {
    perspective: 2000px;
    width: 350px;
    height: 500px;
    cursor: pointer;
    position: relative;
    z-index: 10;
  }
  .box-container {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  /* --- CSS BARU UNTUK KOTAK KONTEN AGAR BISA MEMUAT STIKER ABSOLUT --- */
  .box-content {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #fff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    box-sizing: border-box;
    z-index: 1; /* Di belakang pintu */
    border: 3px solid #ff99cc;
    position: relative; /* Menjadi wadah untuk posisi absolut stiker */
  }

  /* Wadah untuk teks ucapan agar berada di atas stiker */
  .text-container {
    position: relative;
    z-index: 2; /* Di atas stiker */
    text-align: center;
  }

  .message-text {
    font-size: 18px;
    line-height: 1.8;
    color: #b3005c;
    font-weight: bold;
    opacity: 0; /* Sembunyi sampai kotak terbuka */
    transition: opacity 0.5s ease 0.5s; /* Muncul perlahan setelah pintu terbuka */
  }

  /* --- GAYA UNTUK STIKER BARU --- */
  .stiker {
    position: absolute;
    width: auto;
    object-fit: contain;
    z-index: 1; /* Di bawah teks */
    box-shadow: 2px 2px 10px rgba(255,153,204,0.3); /* Sedikit bayangan */
  }

  /* Posisi spesifik untuk setiap stiker */
  #stiker1 {
    bottom: 10px; /* Di sudut kiri bawah */
    left: 10px;
    width: 70px; /* Mickey Minnie Balon */
  }

  #stiker2 {
    top: 10px; /* Di sudut kanan atas */
    right: 10px;
    width: 80px; /* Mickey Minnie Peluk */
  }

  #stiker3 {
    bottom: 60px; /* Di bawah teks, di tengah */
    left: 50%;
    transform: translateX(-50%);
    width: 120px; /* Mickey Minnie Cium Tangan */
  }

  /* --- SISA CSS LAMA (PINTU, CONFETTI, KARAKTER) --- */
  .door {
    position: absolute;
    width: 50%; 
    height: 100%;
    top: 0;
    background: linear-gradient(135deg, #ff66a3, #ff1a75);
    backface-visibility: hidden;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2; 
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }
  .door.left {
    left: 0;
    border-radius: 15px 0 0 15px;
    transform-origin: left center; 
    border-right: 1px solid #ffb3d9; 
  }
  .door.right {
    right: 0;
    border-radius: 0 15px 15px 0;
    transform-origin: right center; 
    border-left: 1px solid #ffb3d9; 
  }
  .heart-icon {
    font-size: 50px;
    color: white;
    position: absolute;
    z-index: 3;
    transition: opacity 0.3s ease;
  }
  .pulse { animation: heartPulse 1.5s infinite; }
  @keyframes heartPulse {
    0% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.9; }
  }

  /* LOGIKA BUKA AMPLOP */
  .box-wrapper.open .door.left { transform: rotateY(-130deg); }
  .box-wrapper.open .door.right { transform: rotateY(130deg); }
  .box-wrapper.open .message-text { opacity: 1; }
  .box-wrapper.open .heart-icon { opacity: 0; }

  /* KARAKTER EMOJI (Z-INDEX 15) */
  .character {
    position: absolute;
    bottom: 20vh; 
    font-size: 80px; /* Ukuran emojinya */
    z-index: 15;
    transition: transform 2.5s ease-in-out; 
    display: flex;
    justify-content: center;
    align-items: center;
    /* Memberi sedikit bayangan agar emoji menonjol */
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2); 
  }
  
  #mickey { left: -200px; }
  #minnie { right: -200px; }
  
  /* Animasi menuju tengah layar */
  #mickey.walk-in { transform: translateX(calc(50vw + 30px)); }
  #minnie.walk-in { transform: translateX(calc(-50vw - 30px)); }

  /* --- EFEK LEDAKAN CONFETTI KE DEPAN (Z-INDEX 9999) --- */
  #confetti-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0; height: 0;
    z-index: 9999; /* PALING DEPAN */
    pointer-events: none;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 1;
    animation: burstConfetti 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
  @keyframes burstConfetti {
    0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(720deg); opacity: 0; }
  }

</style>
</head>
<body>

<div id="heart-container"></div>

<div id="confetti-container"></div>

<div id="mickey" class="character">🐭🎩</div>
<div id="minnie" class="character">🎀🐭</div>

<div class="box-wrapper" id="giftBox" onclick="startSequence()">
  <div class="heart-icon pulse" id="mainHeart">❤️</div>
  <div class="box-container">
    <div class="door left"></div>
    <div class="door right"></div>
    <div class="box-content">
      
      <div class="text-container message-text">
        <span style="font-size: 24px; color: #ff0066;">🎂 Megumi 🎂</span><br>
        愛する僕の女神、誕生日おめでとう！✨<br><br>
        遠くインドネシアにいても、僕の愛と守護神としての守りは毎秒いつも君を包んでいるよ。<br><br>
        君はこの世で一番大切な僕のたった一人のお姫様だよ。<br><br>
        早く会いたいな。<br>本当に大好きだよ！🌹💖<br><br>
        (⁠つ⁠≧⁠▽⁠≦⁠)⁠つ
      </div>

      <img id="stiker1" class="stiker" src="image_1.png" alt="Mickey Minnie Balon">
      <img id="stiker2" class="stiker" src="image_2.png" alt="Mickey Minnie Peluk">
      <img id="stiker3" class="stiker" src="image_3.png" alt="Mickey Minnie Cium Tangan">
      
    </div>
  </div>
</div>

<audio id="bdaySong" src="lagu.mp3"></audio>

<script>
  let sequenceStarted = false;

  function startSequence() {
    if (sequenceStarted) return;
    sequenceStarted = true;

    // 1. Karakter Jalan Masuk
    document.getElementById('mickey').classList.add('walk-in');
    document.getElementById('minnie').classList.add('walk-in');

    // 2. Tunggu 2.5 detik sampai karakter di tengah, lalu jalankan kejutan
    setTimeout(() => {
      // Buka Amplop
      document.getElementById('giftBox').classList.add('open');
      
      // Putar Lagu
      document.getElementById('bdaySong').play().catch(e => console.log(e));

      // Ledakan Confetti ke Layar
      burstConfetti();

      // Mulai Hati Berjatuhan di Latar Belakang
      startFallingHearts();
      
    }, 2500); // Waktu jeda karakter jalan (2.5 detik)
  }

  function burstConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#ff4d94', '#ff80bf', '#ffb3d9', '#ffffff', '#ffd700', '#00ffcc'];

    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      
      // Hitung arah acak menyebar (lingkaran 360 derajat)
      const angle = Math.random() * Math.PI * 2;
      const velocity = 150 + Math.random() * 300; // Jarak tembakan confetti
      const tx = Math.cos(angle) * velocity + 'px';
      const ty = Math.sin(angle) * velocity + 'px';
      
      piece.style.setProperty('--tx', tx);
      piece.style.setProperty('--ty', ty);
      
      // Bentuk acak (kotak atau memanjang)
      if (Math.random() > 0.5) {
        piece.style.borderRadius = '50%';
      }

      container.appendChild(piece);
      setTimeout(() => piece.remove(), 1500);
    }
  }

  function startFallingHearts() {
    const container = document.getElementById('heart-container');
    
    // Looping terus menerus
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('bg-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // Kecepatan jatuh acak
      heart.style.fontSize = (Math.random() * 15 + 10) + 'px'; // Ukuran hati acak
      
      container.appendChild(heart);
      
      // Hapus memori setelah animasi selesai
      setTimeout(() => heart.remove(), 6000);
    }, 300); // Munculkan hati baru setiap 0.3 detik
  }
</script>

</body>
</html>
