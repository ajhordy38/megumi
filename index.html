<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Surprise for My Goddess</title>
<style>
  body {
    background-color: #ffe0f0; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Times New Roman', Times, serif; 
    margin: 0;
    overflow: hidden; 
    position: relative;
  }

  /* --- EFEK HATI JATUH DI BELAKANG --- */
  #heart-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0; 
    pointer-events: none;
  }
  .bg-heart {
    position: absolute;
    color: #ff99cc;
    font-size: 20px;
    opacity: 0;
    animation: fallingHeart 4s linear forwards;
  }
  @keyframes fallingHeart {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* --- KOTAK/AMPLOP UTAMA --- */
  .box-wrapper {
    perspective: 2000px;
    width: 350px;
    height: 500px;
    cursor: pointer;
    position: relative;
    z-index: 10;
  }
  .box-container {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }
  .box-content {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #fff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    box-sizing: border-box;
    z-index: 1; 
    border: 3px solid #ff99cc;
    position: relative; 
  }

  /* --- TEKS UCAPAN --- */
  .text-container {
    position: relative;
    z-index: 2; 
    text-align: center;
  }
  .message-text {
    font-size: 16px; /* Disesuaikan sedikit agar lebih pas dengan stiker */
    line-height: 1.8;
    color: #b3005c;
    font-weight: bold;
    opacity: 0; 
    transition: opacity 0.5s ease 0.5s; 
  }

  /* --- GAYA UNTUK STIKER BARU --- */
  .stiker {
    position: absolute;
    width: auto;
    object-fit: contain;
    z-index: 1; 
    /* Menghilangkan background hitam kalau gambar aslinya tidak transparan murni */
    mix-blend-mode: multiply; 
  }

  /* Posisi spesifik stiker hasil revisi */
  #stiker1 {
    bottom: 15px; 
    left: 10px;
    width: 65px; 
  }
  #stiker2 {
    top: 25px; 
    right: 15px;
    width: 50px; /* Sudah dikecilkan agar tidak menimpa teks */
  }
  #stiker3 {
    bottom: 45px; 
    right: 15px; /* Dipindah ke area kanan kosong */
    width: 70px; /* Sudah dikecilkan */
  }

  /* --- PINTU AMPLOP --- */
  .door {
    position: absolute;
    width: 50%; 
    height: 100%;
    top: 0;
    background: linear-gradient(135deg, #ff66a3, #ff1a75);
    backface-visibility: hidden;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2; 
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }
  .door.left {
    left: 0;
    border-radius: 15px 0 0 15px;
    transform-origin: left center; 
    border-right: 1px solid #ffb3d9; 
  }
  .door.right {
    right: 0;
    border-radius: 0 15px 15px 0;
    transform-origin: right center; 
    border-left: 1px solid #ffb3d9; 
  }
  
  /* --- HATI DENYUT --- */
  .heart-icon {
    font-size: 50px;
    color: white;
    position: absolute;
    z-index: 3;
    transition: opacity 0.3s ease;
  }
  .pulse { animation: heartPulse 1.5s infinite; }
  @keyframes heartPulse {
    0% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.9; }
  }

  /* --- LOGIKA BUKA AMPLOP --- */
  .box-wrapper.open .door.left { transform: rotateY(-130deg); }
  .box-wrapper.open .door.right { transform: rotateY(130deg); }
  .box-wrapper.open .message-text { opacity: 1; }
  .box-wrapper.open .heart-icon { opacity: 0; }

  /* --- CONFETTI --- */
  #confetti-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0; height: 0;
    z-index: 9999; 
    pointer-events: none;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 1;
    animation: burstConfetti 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
  @keyframes burstConfetti {
    0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(720deg); opacity: 0; }
  }

</style>
</head>
<body>

<div id="heart-container"></div>
<div id="confetti-container"></div>

<div class="box-wrapper" id="giftBox" onclick="startSequence()">
  <div class="heart-icon pulse" id="mainHeart">❤️</div>
  <div class="box-container">
    <div class="door left"></div>
    <div class="door right"></div>
    
    <div class="box-content">
      <div class="text-container message-text">
        <span style="font-size: 22px; color: #ff0066;">🎂 Megumi 🎂</span><br>
        愛する僕の女神、誕生日おめでとう！✨<br><br>
        遠くインドネシアにいても、僕の愛と守護神としての守りは毎秒いつも君を包んでいるよ。<br><br>
        君はこの世で一番大切な僕のたった一人のお姫様だよ。<br><br>
        早く会いたいな。<br>本当に大好きだよ！🌹💖<br><br>
        (⁠つ⁠≧⁠▽⁠≦⁠)⁠つ
      </div>

      <img id="stiker1" class="stiker" src="image_1.png" alt="Balon">
      <img id="stiker2" class="stiker" src="image_2.png" alt="Peluk">
      <img id="stiker3" class="stiker" src="image_3.png" alt="Cium Tangan">
    </div>
  </div>
</div>

<audio id="bdaySong" src="lagu.mp3"></audio>

<script>
  let sequenceStarted = false;

  function startSequence() {
    if (sequenceStarted) return;
    sequenceStarted = true;

    // Langsung buka amplop tanpa jeda waktu karena animasi tikus dihapus
    document.getElementById('giftBox').classList.add('open');
    document.getElementById('bdaySong').play().catch(e => console.log(e));
    burstConfetti();
    startFallingHearts();
  }

  function burstConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#ff4d94', '#ff80bf', '#ffb3d9', '#ffffff', '#ffd700', '#00ffcc'];

    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      
      const angle = Math.random() * Math.PI * 2;
      const velocity = 150 + Math.random() * 300; 
      const tx = Math.cos(angle) * velocity + 'px';
      const ty = Math.sin(angle) * velocity + 'px';
      
      piece.style.setProperty('--tx', tx);
      piece.style.setProperty('--ty', ty);
      
      if (Math.random() > 0.5) piece.style.borderRadius = '50%';

      container.appendChild(piece);
      setTimeout(() => piece.remove(), 1500);
    }
  }

  function startFallingHearts() {
    const container = document.getElementById('heart-container');
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('bg-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; 
      heart.style.fontSize = (Math.random() * 15 + 10) + 'px'; 
      
      container.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 300); 
  }
</script>

</body>
</html>
