<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Goddess</title>
<style>
  body {
    background-color: #ffe0f0; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Times New Roman', Times, serif; 
    margin: 0;
    overflow: hidden; 
    position: relative;
  }

  /* --- LATAR BELAKANG HATI --- */
  #heart-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .bg-heart { position: absolute; color: #ff99cc; font-size: 20px; opacity: 0; animation: fallingHeart 4s linear forwards; }
  @keyframes fallingHeart { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

  /* --- AMPLOP --- */
  .box-wrapper {
    perspective: 2000px;
    width: 350px;
    height: 500px;
    cursor: pointer;
    position: relative;
    z-index: 10;
  }
  .box-container { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
  .box-content {
    position: absolute; width: 100%; height: 100%; background-color: #fff; border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center;
    padding: 30px; box-sizing: border-box; z-index: 1; border: 3px solid #ff99cc; position: relative;
  }

  /* --- TEKS PESAN --- */
  .message-text {
    font-size: 15px; line-height: 1.7; color: #b3005c; font-weight: bold; opacity: 0; 
    transition: opacity 0.5s ease 0.8s; text-align: center;
  }

  /* --- STIKER --- */
  .stiker { position: absolute; width: auto; object-fit: contain; z-index: 1; mix-blend-mode: multiply; }
  #stiker1 { bottom: 15px; left: 10px; width: 65px; }
  #stiker2 { top: 25px; right: 15px; width: 50px; }
  #stiker3 { bottom: 45px; right: 15px; width: 70px; }

  /* --- PINTU AMPLOP --- */
  .door {
    position: absolute; width: 50%; height: 100%; top: 0;
    background: linear-gradient(135deg, #ff66a3, #ff1a75); z-index: 2;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .door.left { left: 0; border-radius: 15px 0 0 15px; transform-origin: left; border-right: 1px solid #ffb3d9; }
  .door.right { right: 0; border-radius: 0 15px 15px 0; transform-origin: right; }

  /* --- SEGEL PITA HATI --- */
  .ribbon-seal {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; z-index: 5; transition: all 0.6s ease;
  }
  .ribbon-heart {
    background-color: #ff0055; width: 50px; height: 50px; position: relative;
    transform: rotate(45deg); margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .ribbon-heart::before, .ribbon-heart::after {
    content: ''; width: 50px; height: 50px; background-color: #ff0055;
    border-radius: 50%; position: absolute;
  }
  .ribbon-heart::before { top: -25px; left: 0; }
  .ribbon-heart::after { left: -25px; top: 0; }

  .box-wrapper.open .ribbon-seal {
    transform: translate(-300px, -50%) scaleX(2); opacity: 0;
  }

  .box-wrapper.open .door.left { transform: rotateY(-130deg); }
  .box-wrapper.open .door.right { transform: rotateY(130deg); }
  .box-wrapper.open .message-text { opacity: 1; }

  /* --- CONFETTI --- */
  #confetti-container { position: absolute; top: 50%; left: 50%; z-index: 9999; pointer-events: none; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; animation: burstConfetti 1.5s forwards; }
  @keyframes burstConfetti { 0% { transform: translate(0, 0) scale(0.5); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div id="heart-container"></div>
<div id="confetti-container"></div>

<div class="box-wrapper" id="giftBox" onclick="checkTimeAndOpen()">
  <div class="ribbon-seal" id="seal"><div class="ribbon-heart"></div></div>
  
  <div class="box-container">
    <div class="door left"></div>
    <div class="door right"></div>
    <div class="box-content">
      <div class="message-text">
        <span style="font-size: 20px; color: #ff0066;">🎂 めぐみ 🎂</span><br>
        愛する僕の女神、恵美へ。誕生日おめでとう！✨<br><br>
        遠くインドネシアにいても、僕의愛と情熱は毎秒いつも恵美を包んでいるよ。<br>
        恵美はこの世で一番大切な、僕のたった一人の恋人。<br>
        恵美の願いがすべて叶いますように。愛する恵美のために最高の幸せを祈っているよ。<br><br>
        僕の愛おしい恵美、本当に心から愛してる！<br>
        (⁠づ⁠￣⁠ ⁠³⁠￣⁠)⁠づ
      </div>
      <img id="stiker1" class="stiker" src="image_1.png">
      <img id="stiker2" class="stiker" src="image_2.png">
      <img id="stiker3" class="stiker" src="image_3.png">
    </div>
  </div>
</div>

<audio id="bdaySong" src="lagu.mp3"></audio>

<script>
  let sequenceStarted = false;

  function checkTimeAndOpen() {
    // LOCK DINONAKTIFKAN UNTUK PENGETESAN
    /*
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const jstTime = new Date(utc + (3600000 * 9));
    const targetTime = new Date("2026-04-10T00:00:00+09:00");

    if (jstTime < targetTime) {
      alert("ちょっと待ってね、愛する恵美。\n恵美のアーメッドは今ウェブサイトを作っているところだよ。\n(⁠づ⁠￣⁠ ⁠³⁠￣⁠)⁠づ");
      return;
    }
    */

    if (sequenceStarted) return;
    sequenceStarted = true;

    document.getElementById('giftBox').classList.add('open');
    document.getElementById('bdaySong').play().catch(e => console.log(e));
    
    // Confetti
    const container = document.getElementById('confetti-container');
    const colors = ['#ff4d94', '#ff80bf', '#ffb3d9', '#ffffff', '#ffd700'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      const angle = Math.random() * Math.PI * 2;
      const velocity = 150 + Math.random() * 300;
      piece.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
      piece.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 1500);
    }

    // Hati Jatuh
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('bg-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.getElementById('heart-container').appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 300);
  }
</script>
</body>
</html>
